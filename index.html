<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP Trend Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
    
<body>
<header class="header">
    <img id="logoCategoria" class="logo"
    src="https://lh3.googleusercontent.com/d/19Tqu5sfgN26MqUu3A3CVpaohOPzivXHW">
    <h1>JP Trend Store</h1>
    <p>Medias • Joyería • Accesorios</p>
</header>

<div class="grupo-filtros">

<button onclick="filtrarPublico('Todos')">
<i class="fa-solid fa-layer-group"></i>
Todos
</button>

<button onclick="filtrarPublico('Hombre')">
<i class="fa-solid fa-person"></i>
Hombre
</button>

<button onclick="filtrarPublico('Mujer')">
<i class="fa-solid fa-person-dress"></i>
Mujer
</button>

<button onclick="filtrarPublico('Niño')">
<i class="fa-solid fa-child"></i>
Niño
</button>

<button onclick="filtrarPublico('Niña')">
<i class="fa-solid fa-child-dress"></i>
Niña
</button>

<button onclick="filtrarPublico('Unisex')">
<i class="fa-solid fa-venus-mars"></i>
Unisex
</button>

</div>

<div class="cantidad-box">

<button onclick="cambiarCantidad(${i},-1)">
−

</button>

<span id="cantidad-${i}">
1
</span>

<button onclick="cambiarCantidad(${i},1)">
+
</button>

</div>

<main class="container">
    <section>
        <div id="productos"></div>
    </section>

    <aside class="pedido">
        <h2>Tu pedido</h2>
        <ul id="listaPedido"></ul>
        <p><strong>Total productos:</strong> <span id="totalItems">0</span></p>
        <a id="btnWhatsapp" target="_blank" class="btn-wsp">Enviar pedido</a>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
