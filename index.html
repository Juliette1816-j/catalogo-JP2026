<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP Trend Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=6">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
<header class="header">
    <img id="logoCategoria" class="logo"
    src="https://lh3.googleusercontent.com/d/19Tqu5sfgN26MqUu3A3CVpaohOPzivXHW">
    <h1>JP Trend Store</h1>
    <p>Medias • Joyería • Accesorios</p>
</header>

<div class="buscador-container">

<input
id="buscador"
type="text"
placeholder="Buscar producto...">

</div>

<div class="filtros">

<div class="grupo-filtros">

<button
class="categoria-btn"
onclick="filtrarCategoria('Medias', this)">
🧦 Medias
</button>

<button
class="categoria-btn"
onclick="filtrarCategoria('Joyeria', this)">
💎 Joyería
</button>

</div>

<div class="grupo-filtros">

<button
class="mujer-btn"
onclick="filtrarPublico('Mujer', this)">
👩🏻‍🦰 Mujer
</button>

<button
class="hombre-btn"
onclick="filtrarPublico('Hombre', this)">
🧑🏼‍🦱 Hombre
</button>

<button
class="unisex-btn"
onclick="filtrarPublico('Unisex', this)">
⚧️ Unisex
</button>

<button
class="nino-btn"
onclick="filtrarPublico('Niño', this)">
👦🏻 Niño
</button>

<button
class="nina-btn"
onclick="filtrarPublico('Niña', this)">
👧🏽 Niña
</button>

</div>

</div>

<main class="container">
    <section>
        <div id="productos"></div>
    </section>

    <aside class="pedido" id="pedidoPanel">
        <div class="pedido-header">
            <h2>Tu pedido</h2>
            <button class="btn-cerrar-pedido" id="btnCerrarPedido">✕</button>
        </div>
        <ul id="listaPedido"></ul>

        <p>
        <strong>Productos:</strong>
        <span id="totalItems">0</span>
        </p>

        <p>
        <strong>Total:</strong>
        $<span id="totalValor">0</span>
        </p>

        <a id="btnWhatsapp" target="_blank" class="btn-wsp">Enviar pedido</a>
    </aside>
</main>

<div class="overlay-pedido" id="overlayPedido"></div>

<button class="carrito-flotante" id="btnCarritoFlotante">
    🛒
    <span class="badge-carrito" id="badgeCarrito">0</span>
</button>

<script src="script.js?v=6"></script>
</body>
</html>
