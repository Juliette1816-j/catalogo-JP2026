<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP Trend Store</title>
<link rel="stylesheet" href="style.css">
</head>
    
<body>
<header class="header">
    <img id="logoCategoria" class="logo"
    src="https://lh3.googleusercontent.com/d/19Tqu5sfgN26MqUu3A3CVpaohOPzivXHW">
    <h1>JP Trend Store</h1>
    <p>Medias • Joyería • Accesorios</p>
</header>

<div class="toolbar">
    <input id="buscador" placeholder="🔍 Buscar producto">
    <div class="filtros">
        <button onclick="filtrar('Todos')">Todos</button>
        <button onclick="filtrar('Medias')">🧦 Medias</button>
        <button onclick="filtrar('Joyeria')">💎 Joyería</button>
    </div>
    <div class="tags">
   <span class="tag categoria">
          MEDIAS
       </span>

       <span class="tag publico">
          NIÑO
       </span>
    </div>
</div>

<main class="container">
    <section>
        <div id="productos"></div>
    </section>

    <aside class="pedido">
        <h2>Tu pedido</h2>
        <ul id="listaPedido"></ul>
        <p><strong>Total productos:</strong> <span id="totalItems">0</span></p>
        <a id="btnWhatsapp" target="_blank" class="btn-wsp">Enviar pedido</a>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
