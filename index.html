<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Trend Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <img id="logoCategoria"
         src="logo-negro.png"
         class="logo"
         alt="JP Trend Store">

    <h1>JP Trend Store</h1>

    <p>Medias, accesorios y tendencias que marcan tu estilo</p>

</header>

<div class="filtros">

    <button onclick="filtrar('Todos')">Todos</button>

    <button onclick="filtrar('Hombre')">👨 Hombre</button>

    <button onclick="filtrar('Mujer')">👩 Mujer</button>

    <button onclick="filtrar('Niño')">🧒 Niño</button>

    <button onclick="filtrar('Niña')">👧 Niña</button>

    <button onclick="filtrar('Unisex')">✨ Unisex</button>

</div>

<input
id="buscador"
type="text"
placeholder="🔍 Buscar producto...">

<div id="productos"></div>

<script src="script.js"></script>

</body>
</html>
